<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notized — Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

<div id="screen-dashboard" class="screen active">
  <div class="dash-header">
    <div class="dash-header-left">
      <button class="btn-back" onclick="location.href='index.html'">← Back</button>
      <div class="topbar-divider"></div>
      <div class="nav-logo">
        <span class="nav-logo-icon" style="width:24px;height:24px;border-radius:5px; background: var(--sage); display: flex; align-items: center; justify-content: center;">
          <svg width="12" height="12" viewBox="0 0 14 14" fill="none"><path d="M2 2h10v2H2V2zm0 4h7v2H2V6zm0 4h5v2H2v-2z" fill="white"/></svg>
        </span>
        <span class="nav-wordmark" style="font-size:17px; font-family: 'DM Serif Display', serif;">Notized</span>
      </div>
    </div>
  </div>

  <div class="tab-nav">
    <button class="tab-btn active" data-tab="overview" onclick="switchTab('overview')">Overview</button>
    <button class="tab-btn" data-tab="clusters" onclick="switchTab('clusters')">Topic Clusters</button>
    <button class="tab-btn" data-tab="path" onclick="switchTab('path')">Learning Path</button>
  </div>

  <div class="dash-content">
    <div id="tab-overview" class="tab-panel active">
      <div class="overview-grid">
        <div class="card slide-up stagger-1">
          <div class="card-header">
            <span class="card-icon sage">✦</span>
            <span class="card-title">Smart Summary</span>
          </div>
          <ul class="summary-list" id="summary-list">
            </ul>
        </div>

        <div class="card slide-up stagger-2">
          <div class="card-header">
            <span class="card-icon indigo">◈</span>
            <span class="card-title">Keyword Radar</span>
          </div>
          <div class="keyword-chips" id="keyword-chips">
            </div>
          <div class="chip-tip">💡 Scan these chips first when reviewing. They anchor the core ideas.</div>
        </div>
      </div>

      <div class="stats-container">
        <div class="stat-card slide-up stagger-3">
          <span class="stat-icon indigo">◈</span>
          <div>
            <div class="stat-num" id="stat-keywords">0</div>
            <div class="stat-label">Key Concepts</div>
          </div>
        </div>

        <div class="stat-card slide-up stagger-4">
          <span class="stat-icon sage">⬡</span>
          <div>
            <div class="stat-num" id="stat-clusters">0</div>
            <div class="stat-label">Topic Clusters</div>
          </div>
        </div>

        <div class="stat-card slide-up stagger-5">
          <span class="stat-icon amber">↓</span>
          <div>
            <div class="stat-num" id="stat-steps">0</div>
            <div class="stat-label">Study Steps</div>
          </div>
        </div>
      </div>
    </div>

    <div id="tab-clusters" class="tab-panel">
      <div class="clusters-grid" id="clusters-grid"></div>
    </div>

    <div id="tab-path" class="tab-panel">
      <p class="path-intro">Follow this sequence for maximum retention. Each step builds on the previous.</p>
      <div class="path-wrap">
        <div class="path-line"></div>
        <div class="path-list" id="path-list"></div>
      </div>
    </div>
  </div>
</div>

<script src="script.js"></script>

</body>
</html>
